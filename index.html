<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Imad Hafsi — Commercial Analyst</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚓</text></svg>">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Instrument+Sans:ital,wght@0,300;0,400;0,500;0,600;1,300&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>

:root {
  --ink:    #080808;
  --paper:  #F2EFEA;
  --acid:   #C6FF3D;
  --acid-d: #9BCC22;
  --dim:    #3A3A3A;
  --mute:   #666;
  --rule:   rgba(255,255,255,0.07);
  --ruler:  rgba(0,0,0,0.1);

  --bebas: 'Bebas Neue', sans-serif;
  --body:  'Instrument Sans', sans-serif;
  --mono:  'DM Mono', monospace;
}

/* RESET */
*,*::before,*::after { box-sizing:border-box; margin:0; padding:0; }
html { scroll-behavior:smooth; font-size:16px; }
body {
  font-family: var(--body);
  background: var(--ink);
  color: var(--paper);
  overflow-x: hidden;
  cursor: none;
}
a { color: inherit; text-decoration: none; }

/* GRAIN OVERLAY */
body::before {
  content:'';
  position: fixed; inset: 0; z-index: 9999;
  pointer-events: none;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.035'/%3E%3C/svg%3E");
  background-size: 128px 128px;
  opacity: 0.45;
}

/* HERO SECTION - MODIFIED */
#hero {
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  justify-content: flex-end;
  padding-bottom: 0;
  position: relative;
  overflow: hidden;
  background-image: 
    linear-gradient(to bottom, rgba(8,8,8,0.5) 0%, rgba(8,8,8,0.9) 100%), 
    url('IMG.jpg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
}

.hero-bg-grid {
  position: absolute; inset: 0; pointer-events: none;
  background-image:
    linear-gradient(rgba(198,255,61,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(198,255,61,0.03) 1px, transparent 1px);
  background-size: 80px 80px;
  mask-image: radial-gradient(ellipse 100% 80% at 50% 100%, black 30%, transparent 80%);
  z-index: 1;
}

.hero-name-block {
  padding: 0 2.2rem;
  position: relative; z-index: 2;
}

.hero-name {
  font-family: var(--bebas);
  font-size: clamp(110px, 17.5vw, 220px);
  line-height: 0.88;
  letter-spacing: -0.015em;
  color: var(--paper);
  display: block;
}
.hero-name .accent-word { color: var(--acid); }

/* ... Rest of the original CSS and HTML continues here ... */
</style>
</head>
<body>
</body>
</html>
